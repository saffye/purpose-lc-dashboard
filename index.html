<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBS LC</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #7a5f28;
    --bg: #0a0804;
    --bg2: #110e08;
    --bg3: #1a1508;
    --border: #2e2510;
    --text: #e8dfc8;
    --text-dim: #8a7d60;
    --red: #c94c4c;
    --green: #4caa6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 17px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Parchment texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.02) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    text-align: center;
    padding: 48px 0 20px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 320px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px auto 0;
  }

  .guild-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.4em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 0.05em;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .subtitle {
    margin-top: 10px;
    color: var(--text-dim);
    font-style: italic;
    font-size: 20px;
    letter-spacing: 0.08em;
  }

  /* Dot legend */
  .dot-legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 16px 0 0;
    flex-wrap: wrap;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: inline-block;
    flex-shrink: 0;
  }

  /* Grouping buttons */
  .group-btns {
    display: flex;
    gap: 4px;
  }

  .group-btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }

  .group-btn:hover {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .group-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,0.08);
  }

  .role-icon {
    font-size: 11px;
    opacity: 0.75;
    margin-left: 3px;
    cursor: default;
  }

  .role-subtitle {
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    text-transform: none;
  }

  /* Loading spinner */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--gold-dim);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 10px 24px;
    border: 1px solid var(--gold-dim);
    background: transparent;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
    z-index: -1;
  }

  .btn:hover {
    color: var(--bg);
    border-color: var(--gold);
  }

  .btn:hover::before { transform: scaleX(1); }

  .btn.primary {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
  }

  .btn.primary:hover { background: var(--gold-light); border-color: var(--gold-light); }
  .btn.primary::before { display: none; }

  .status {
    font-style: italic;
    color: var(--text-dim);
    font-size: 14px;
    margin-left: auto;
  }

  .status.loading { color: var(--gold-dim); }
  .status.error { color: var(--red); }
  .status.success { color: var(--green); }

  /* Role sections */
  .role-section {
    margin-bottom: 48px;
    animation: fadeIn 0.4s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .role-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }

  .role-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .role-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold-dim), transparent);
  }

  .role-toggle {
    font-size: 11px;
    color: var(--gold-dim);
    margin-left: 6px;
  }

  .role-header:hover .role-count { color: var(--gold); }
  .role-header:hover .role-toggle { color: var(--gold); }

  .role-count {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* Table */
  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  thead th:not(:first-child) { text-align: right; }
  thead th[data-col] { cursor: pointer; user-select: none; white-space: nowrap; }
  thead th[data-col]:hover { color: var(--gold); }
  .sort-arrow { color: var(--gold-dim); font-size: 10px; }
  td.points-cell, td.consumes-cell { text-align: center !important; }
  td.att-count { text-align: right !important; font-family: 'Cinzel', serif; font-size: 13px; color: var(--text-dim); }
  td:has(.raid-dots), td:has(.raid-dot), td:has(.raid-star) { text-align: center !important; }

  tbody tr {
    border-bottom: 1px solid rgba(46,37,16,0.6);
    transition: background 0.15s;
  }

  tbody tr:hover { background: rgba(201,168,76,0.04); }

  tbody tr.na-row { opacity: 0.45; }

  td {
    padding: 10px 12px;
    font-size: 16px;
  }

  td:not(:first-child) { text-align: right; }

  .player-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.02em;
    min-width: 16ch;
    width: 16ch;
  }

  .raids-num {
    color: var(--text-dim);
    font-size: 14px;
  }

  .window-num {
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Attendance bar cell */
  .att-cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .att-pct {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    min-width: 52px;
    text-align: right;
  }

  .att-pct.high { color: #8abf50; }
  .att-pct.mid { color: #d4c84a; }
  .att-pct.low { color: #c94c4c; }
  .att-pct.exact100 { color: #4caa6e; }
  .att-bar-fill.exact100 { background: #4caa6e; }
  .att-bar-fill.high { background: #8abf50; }
  .att-bar-fill.mid { background: #d4c84a; }
  .att-bar-fill.low { background: #c94c4c; }
  .att-pct.na { color: var(--text-dim); font-weight: 400; font-family: 'Crimson Pro', serif; font-style: italic; }

  .att-bar-bg {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .att-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }



  /* Summary footer */
  .summary {
    margin-top: 48px;
    padding: 24px;
    border: 1px solid var(--border);
    background: var(--bg2);
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    text-align: center;
    align-items: start;
  }

  .summary-item label {
    display: block;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
    min-height: 2.4em;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .summary-item .val {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--gold);
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 24px;
    color: var(--text-dim);
    font-style: italic;
  }

  .empty .icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 0 36px;
  }

  /* Points highlighting */
  .points-cell {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    font-weight: 700;
    text-align: right;
    color: var(--text-dim);
  }

  .pts-top .points-cell,
  .points-cell.pts-top {
    color: #e05555;
    text-shadow: 0 0 12px rgba(220,80,80,0.5);
  }

  .pts-bottom .points-cell,
  .points-cell.pts-bottom {
    color: #4caa6e;
    text-shadow: 0 0 12px rgba(76,170,110,0.4);
  }

  tr.pts-top {
    background: rgba(200, 60, 60, 0.06);
  }

  tr.pts-bottom {
    background: rgba(76, 170, 110, 0.06);
  }

  /* Priority column */
  .priority-cell {
    text-align: center !important;
  }

  .priority-score {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    cursor: default;
  }

  /* Gear issue flag */
  .gear-flag-cell {
    width: 20px;
    text-align: center;
    padding: 10px 4px;
  }

  .gear-flag {
    color: #e07830;
    font-size: 13px;
    cursor: default;
    filter: drop-shadow(0 0 4px rgba(224,120,48,0.6));
  }

  /* Consumes column */
  .consumes-cell {
    text-align: right;
  }

  /* Inactive players */
  .inactive-row {
    opacity: 0.4;
    filter: grayscale(0.4);
  }

  .inactive-badge {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    border: 1px solid #4a3f28;
    padding: 2px 6px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* Loot expansion */
  .loot-arrow {
    font-size: 11px;
    color: var(--gold-dim);
    transition: transform 0.2s;
    margin-left: 4px;
  }

  .player-name:hover .loot-arrow { color: var(--gold); }

  .loot-row {
    animation: fadeIn 0.2s ease both;
  }

  .loot-cell {
    padding: 10px 16px 14px 24px !important;
    background: var(--bg2);
    border-bottom: 1px solid var(--border) !important;
  }

  .loot-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .loot-item {
    font-size: 15px;
    color: var(--gold-light);
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--gold-dim);
    padding: 3px 10px;
    white-space: nowrap;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s, color 0.15s;
  }

  a.loot-item:hover {
    background: rgba(201,168,76,0.18);
    color: #fff;
    border-color: var(--gold);
  }

  .expand-section-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold-dim);
    margin-bottom: 8px;
  }

  .cla-entry-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    margin-bottom: 6px;
    margin-top: 4px;
  }

  .loot-item.gear-issue {
    color: #e09050;
    border-color: #7a4a20;
    background: rgba(200,120,60,0.07);
  }

  .buff-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 4px;
  }

  .buff-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 4px 10px;
    border: 1px solid var(--border);
    font-size: 11px;
    min-width: 70px;
  }

  .buff-label {
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
    text-align: center;
  }

  .buff-val {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
  }

  .buff-ok { border-color: #2a5a3a; background: rgba(76,170,110,0.06); }
  .buff-ok .buff-val { color: var(--green); }
  .buff-missing { border-color: #5a2a2a; background: rgba(200,80,80,0.06); }
  .buff-missing .buff-val { color: var(--red); }
  .buff-partial { border-color: #5a4a20; background: rgba(200,160,60,0.06); }
  .buff-partial .buff-val { color: var(--gold); }

  .no-loot {
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Dot indicators for raid dates */
  .raid-dots {
    display: inline-flex;
    gap: 4px;
    justify-content: center;
    flex-wrap: nowrap;
  }

  .raid-dot {
    width: 8px;
    height: 8px;
    min-width: 8px;
    border-radius: 50%;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .raid-dot.present { background: var(--green); border-color: var(--green); }

  .raid-star {
    font-size: 14px;
    width: 8px;
    height: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    overflow: visible;
    position: relative;
    top: -1px;
    color: #4caa6e;
    cursor: default;
    filter: drop-shadow(0 0 3px currentColor);
  }
  .raid-dot.absent { background: transparent; }
  .raid-dot.inactive { background: transparent; border-color: transparent; }

  /* CLA Manager */
  .cla-manager {
    border: 1px solid var(--border);
    background: var(--bg2);
    margin-bottom: 24px;
  }

  .cla-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .cla-header:hover { background: rgba(201,168,76,0.04); }

  .cla-title {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .cla-count {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: 4px;
  }

  .cla-toggle {
    margin-left: auto;
    color: var(--gold-dim);
    font-size: 12px;
  }

  .cla-body {
    border-top: 1px solid var(--border);
    padding: 16px;
  }

  .cla-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }

  .cla-row-label {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--gold);
    min-width: 60px;
  }

  .cla-row-url {
    color: var(--text-dim);
    font-size: 12px;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .cla-row-gids {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  .cla-remove {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    opacity: 0.6;
    transition: opacity 0.15s;
  }

  .cla-remove:hover { opacity: 1; }

  .cla-io-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 10px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .cla-io-hint {
    font-size: 13px;
    font-style: italic;
  }

  .cla-add-form {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .cla-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    width: 120px;
    outline: none;
    transition: border-color 0.15s;
  }

  .cla-input.wide { width: 260px; }
  .cla-input:focus { border-color: var(--gold-dim); }
  .cla-input::placeholder { color: var(--text-dim); }


  /* Custom item dropdown */
  .loot-item-display {
    min-height: 38px;
    position: relative;
  }
  .loot-item-display::after {
    content: '▾';
    position: absolute;
    right: 10px;
    color: var(--gold-dim);
    font-size: 12px;
  }
  .loot-item-dropdown {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--bg2);
    border: 1px solid var(--gold-dim);
    z-index: 1000;
    max-height: 300px;
    overflow-y: auto;
  }
  .loot-item-option {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    color: var(--text);
    border-bottom: 1px solid rgba(46,37,16,0.4);
    transition: background 0.1s;
  }
  .loot-item-option:hover { background: rgba(201,168,76,0.08); }
  .loot-item-option.selected { color: var(--gold); }
  .loot-item-option img { width: 18px; height: 18px; border: 1px solid #444; border-radius: 2px; flex-shrink: 0; }

  /* ── Loot Panel ─────────────────────────────────────────────── */
  .loot-selectors {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .loot-select-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 180px;
  }

  .loot-select-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .loot-select {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    width: 100%;
  }

  .loot-select:focus { border-color: var(--gold-dim); }
  .loot-select:disabled { opacity: 0.4; cursor: not-allowed; }
  .loot-select option { background: var(--bg2); }

  /* ── Mobile Responsive ────────────────────────────── */
  @media (max-width: 768px) {

    .container {
      padding: 20px 12px 60px;
    }

    h1 { font-size: 28px; }
    .subtitle { font-size: 13px; }

    /* Controls */
    .controls {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .status { margin-left: 0; }

    /* Legend wraps tightly */
    .dot-legend {
      gap: 10px;

// Normalize player names for fuzzy matching (strip special chars, lowercase)
function normalizeName(name) {
  return name.toLowerCase()

    .replace(/æ/g, 'ae').replace(/œ/g, 'oe').replace(/ß/g, 'ss')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '') // strip accent marks
    .replace(/[^a-z0-9]/g, '');       // strip everything else
}

// Normalize date strings for flexible matching: strip leading zeros, whitespace
// e.g. "03/11", " 3/11 ", "3/11/2026" all -> "3/11"
function normalizeDate(d) {
  return (d || '').trim()
    .replace(/\b0(\d)/g, '$1')   // remove leading zeros from each number
    .replace(/\/\d{4}$/, '')     // strip 4-digit year suffix if present
    .trim();
}

function parseCsvRows(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  return lines.map(line => {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  });
}

function parseGlossary(text) {
  const rows = parseCsvRows(text);
  const data = [];
  for (let i = 1; i < rows.length; i++) { // skip header row
    const row = rows[i];
    const raid = row[0]?.trim();
    const boss = row[1]?.trim();
    const item = row[2]?.trim();
    const eligibleStr = row[9]?.trim(); // col J (index 9)
    if (!raid || !boss || !item) continue;
    const eligibleClasses = eligibleStr ? eligibleStr.split(',').map(c => c.trim()).filter(Boolean) : [];
    const hardPrioStr = row[12]?.trim(); // col M
    const softPrioStr = row[13]?.trim(); // col N
    const hardPrio = hardPrioStr ? hardPrioStr.split(',').map(c => c.trim()).filter(Boolean) : [];
    const softPrio = softPrioStr ? softPrioStr.split(',').map(c => c.trim()).filter(Boolean) : [];
    // Cols E-H (indices 4-7): Tank, Physical DPS, Ranged DPS, Healer
    // If cell is non-empty, that role is eligible. Empty means no restriction if all 4 are empty.
    const roleColMap = [
      { idx: 4, role: 'Tanks' },
      { idx: 5, role: 'Physical DPS' },
      { idx: 6, role: 'Ranged DPS' },
      { idx: 7, role: 'Healers' },
    ];
    const eligibleRoles = roleColMap.filter(r => row[r.idx]?.trim()).map(r => r.role);
    data.push({ raid, boss, item, eligibleClasses, eligibleRoles, hardPrio, softPrio });
  }
  return data;
}

    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  }
  const points = {};
  for (let i = 1; i < lines.length; i++) {

    const name = row[0]?.trim();
    const pts = row[3]?.trim(); // col D = index 3

function parseLoot(text) {
  const lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  function parseRow(line) {
    const result = []; let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  }
  const loot = {};
  for (const line of lines) {
    const row = parseRow(line);
    const item = row[2]?.trim();
    const player = row[4]?.trim();
    const value = parseInt(row[3]?.trim()) || 0; // col D = item value
    if (!item || !player) continue;

    if (!loot[key]) loot[key] = [];
    loot[key].push({ name: item, value });
  }
  // Reverse each player's list so most recent loot appears first
  for (const key in loot) loot[key].reverse();
  return loot;
}

// ── Crypto helpers (AES-GCM via Web Crypto API) ──────────────────
async function deriveKey(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('dbs-lc-salt'), iterations: 100000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

async function encryptData(password, data) {
  const key = await deriveKey(password);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
  return { iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) };
}

async function decryptData(password, encrypted) {
  const key = await deriveKey(password);
  const iv = new Uint8Array(encrypted.iv);
  const data = new Uint8Array(encrypted.data);
  const dec = new TextDecoder();
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
  return JSON.parse(dec.decode(plain));
}

// ── PKCE helpers ──────────────────────────────────────────────────
function generateRandomString(length = 64) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  const arr = crypto.getRandomValues(new Uint8Array(length));
  return Array.from(arr).map(b => chars[b % chars.length]).join('');
}

async function generateCodeChallenge(verifier) {
  const enc = new TextEncoder();
  const digest = await crypto.subtle.digest('SHA-256', enc.encode(verifier));
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function startWclPkce() {
  const verifier = generateRandomString(64);
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem('wclVerifier', verifier);
  const params = new URLSearchParams({
    client_id: WCL_CLIENT_ID,
    redirect_uri: WCL_REDIRECT_URI,
    response_type: 'code',
    code_challenge: challenge,
    code_challenge_method: 'S256',
    state: 'wclauth'
  });

async function exchangeWclCode(code) {
  const verifier = localStorage.getItem('wclVerifier');
  if (!verifier) { console.warn('No PKCE verifier found in session'); return null; }
  // Route through Apps Script to avoid CORS on token endpoint
  // Encode all params as base64 JSON to keep URL short and avoid length issues
  const payload = btoa(JSON.stringify({
    grant_type: 'authorization_code',
    client_id: WCL_CLIENT_ID,
    redirect_uri: WCL_REDIRECT_URI,
    code,
    code_verifier: verifier
  }));
  const rawUrl = APPS_SCRIPT + '?action=wclAuth&payload=' + encodeURIComponent(payload);
  try {
    const text = await proxyFetch(rawUrl);
    let data;
    try { data = JSON.parse(text); } catch(e) { console.warn('Token parse error:', text); return null; }
    if (data.error) { console.warn('Token exchange error:', data); return null; }
    localStorage.removeItem('wclVerifier');
    return data;
  } catch(e) { console.warn('Token exchange failed:', e.message); return null; }
}

async function handleWclCallback() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('state') !== 'wclauth' || !params.get('code')) return false;
  setWclStatus('Exchanging auth code...', '');
  const data = await exchangeWclCode(params.get('code'));
  // Clean URL
  window.history.replaceState({}, document.title, window.location.pathname);
  if (!data?.access_token) { setWclStatus('Auth failed — try again.', 'error'); return false; }
  wclToken = data.access_token;
  wclTokenExpiry = Date.now() + ((data.expires_in || 3600) - 60) * 1000;
  sessionStorage.setItem('wclToken', wclToken);
  sessionStorage.setItem('wclTokenExpiry', String(wclTokenExpiry));
  setWclStatus('✓ Connected to WarcraftLogs!', 'success');
  return true; // fetchWclAllStars will be called after fetchData() completes
}

async function fetchWclAllStars(realm) {
  const token = await getWclToken();
  if (!token) return;
  // Zone 1008 = Gruul's Lair + Magtheridon's Lair on TBC Classic Anniversary
  const zone = { id: 1048, name: "Gruul / Magtheridon" };
  console.log('Using hardcoded WCL zone:', zone.id, zone.name);
  try {

    // Build player list with their role for metric selection
    // Include ALL named players (even pct===null / inactive with no CLA) so spinners get resolved
    const players = lastRenderData.roles.flatMap(r =>
      r.players.filter(p => p.name).map(p => ({ ...p, roleName: r.name }))
    );
    console.log('Fetching WCL for', players.length, 'players');
    // Process in batches of 5 to avoid rate-limiting proxies
    const BATCH_SIZE = 3;
    for (let i = 0; i < players.length; i += BATCH_SIZE) {
      const batch = players.slice(i, i + BATCH_SIZE);
      await Promise.all(batch.map(async p => {
        // Use canonical name from CLA if available, otherwise fall back to display name
        const wclName = canonicalNames[normalizeName(p.name)] || p.name;
        const isHealer = p.roleName === 'Healers';
        const metric = isHealer ? 'hps' : 'dps';
        const charQuery = `{
          characterData {
            character(name: "${wclName}", serverSlug: "${realm}", serverRegion: "${WCL_REGION}") {
              zoneRankings(zoneID: ${zone.id}, metric: ${metric})
            }
          }
        }`;
        try {
          const charData = await wclGraphQL(charQuery, token).catch(e => {
            console.warn('Char query failed for', wclName, e);
            updateWclCell(normalizeName(p.name), null, wclName);
            return null;
          });
          if (!charData) { wclData[normalizeName(p.name)] = null; updateWclCell(normalizeName(p.name), null); return; }
          const char = charData?.data?.characterData?.character;
          const rankings = char?.zoneRankings;
          if (!rankings) { console.warn('No rankings for', p.name, JSON.stringify(charData)?.slice(0, 200)); wclData[normalizeName(p.name)] = null; updateWclCell(normalizeName(p.name), null); return; }
          const key = normalizeName(p.name);
          const entry = {
            points: rankings.allStars?.[0]?.points ?? null,
            rank: rankings.allStars?.[0]?.rank ?? null,
            outOf: rankings.allStars?.[0]?.total ?? null,
            bestPerf: rankings.bestPerformanceAverage ?? null,
            medianPerf: rankings.medianPerformanceAverage ?? null,
          };
          // Sycamoore one-off: use best parse as median (healer median unreliable)
          if (normalizeName(wclName) === 'sycamoore' && entry.bestPerf !== null) {
            entry.medianPerf = entry.bestPerf;
          }
          wclData[key] = entry;
          updateWclCell(key, entry);
        } catch(e) { console.warn('WCL char error for', p.name, e); wclData[normalizeName(p.name)] = null; updateWclCell(normalizeName(p.name), null); }
      }));
      // Small delay between batches to avoid rate limiting
      if (i + BATCH_SIZE < players.length) await new Promise(r => setTimeout(r, 500));
    }

    // Ensure ALL players with spinners get a dash (including those skipped due to pct===null)
    // Mark any unresolved players as null so re-render shows — not spinner
    lastRenderData.roles.flatMap(r => r.players).forEach(p => {
      const key = normalizeName(p.name);
      if (!wclData.hasOwnProperty(key)) wclData[key] = null;
    });

    // Final re-render to update sort order if sorted by WCL
    if (lastRenderData.roles.length) render(lastRenderData);
  } catch(e) {
    console.warn('WCL fetch failed:', e.message);
    lastRenderData.roles.flatMap(r => r.players).forEach(p => {
      wclData[normalizeName(p.name)] = null;
    });
    if (lastRenderData.roles.length) render(lastRenderData);
  }
}

function wclColor(pct) {
  if (pct === null) return 'var(--text-dim)';
  if (pct >= 99) return '#e268a8'; // pink
  if (pct >= 95) return '#ff8000'; // orange
  if (pct >= 75) return '#a335ee'; // purple
  if (pct >= 50) return '#0070ff'; // blue
  if (pct >= 25) return '#1eff00'; // green
  return '#666666'; // grey
}

async function proxyFetch(targetUrl) {
  const proxies = [
    u => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(u),
    u => 'https://corsproxy.io/?' + encodeURIComponent(u),
    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
  ];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy(targetUrl));
      if (res.ok) {
        const text = await res.text();
        if (text && text.length > 2) return text;
      }
    } catch(e) {}
  }
  throw new Error('All proxies failed for: ' + targetUrl);
}

function parseCSV(text) {
  // Normalize line endings, strip BOM, split into rows
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').replace(/^\uFEFF/, '').trim().split('\n');
  // Parse each row properly handling quoted fields
  function parseRow(line) {
    const result = [];
    let cur = '', inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { result.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    result.push(cur.trim());
    return result;
  }
  const rows = lines.map(parseRow);
  const header = rows[0];
  const dates = header.slice(2).filter(d => d.trim());
  const n = dates.length;

  const roles = [];
  let currentRole = null;

  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || row.length < 2) continue;
    const name = row[0].trim();
    const raidsVal = row[1].trim();

    // Role header rows have a name, no raidsVal, and no TRUE/FALSE attendance values
    const attendanceCols = row.slice(2, 2 + n).map(v => v.trim().toUpperCase());
    const hasBooleans = attendanceCols.some(v => v === 'TRUE' || v === 'FALSE');
    if (name && !raidsVal && !hasBooleans) {
      currentRole = { name, players: [] };
      roles.push(currentRole);
      continue;
    }
    if (!name) continue;
    if (!currentRole) continue;

    const flags = row.slice(2, 2 + n).map(v => v.trim().toUpperCase() === 'TRUE');
    const trueIdx = flags.map((b, i) => b ? i : -1).filter(i => i >= 0);

    const totalRaids = n; // total raid columns with dates
    if (trueIdx.length === 0) {
      currentRole.players.push({ name, attended: 0, window: 0, pct: null, flags, n, inactive: false });
    } else {
      const first = trueIdx[0], last = trueIdx[trueIdx.length - 1];
      const raidsSinceLast = (totalRaids - 1) - last; // how many raids after their last attendance
      const inactive = raidsSinceLast > 2;
      // For active players, extend window to the latest raid so missing recent raids counts against them
      const windowEnd = inactive ? last : (totalRaids - 1);
      const window = windowEnd - first + 1;
      const attended = flags.slice(first, windowEnd + 1).filter(Boolean).length;
      const pct = (attended / window) * 100;
      currentRole.players.push({ name, attended, window, pct, flags, n, first, last, inactive });
    }
  }

  return { dates, roles };
}

// Sort state per role: { [roleName]: { col, dir } }
// col: 'player' | 'points' | 'consumes' | 'attendance' | 'priority'
// dir: 'asc' | 'desc'


function getSortedPlayers(role, players, bottom20threshold, top20threshold, pointValues) {
  const state = roleSortState[role] || { col: 'priority', dir: 'desc' };
  const { col, dir } = state;

  const withPct = players.filter(p => p.pct !== null && !p.inactive);
  const inactive = players.filter(p => p.inactive);
  const noPct   = players.filter(p => p.pct === null && !p.inactive);

  withPct.sort((a, b) => {
    let av, bv;
    if (col === 'player') {
      av = a.name.toLowerCase(); bv = b.name.toLowerCase();
    } else if (col === 'points') {
      av = pointsByPlayer[normalizeName(a.name)] ?? 0;
      bv = pointsByPlayer[normalizeName(b.name)] ?? 0;
    } else if (col === 'consumes') {
      const aScores = Object.values(buffScoreByPlayerDate[normalizeName(a.name)] || {}).map(v => v?.total).filter(v => v !== null);
      const bScores = Object.values(buffScoreByPlayerDate[normalizeName(b.name)] || {}).map(v => v?.total).filter(v => v !== null);
      av = aScores.length ? aScores.reduce((x,y) => x+y,0) / aScores.length : -1;
      bv = bScores.length ? bScores.reduce((x,y) => x+y,0) / bScores.length : -1;
    } else if (col === 'priority') {
      av = calculatePriority(a, bottom20threshold, top20threshold, pointValues).score;
      bv = calculatePriority(b, bottom20threshold, top20threshold, pointValues).score;
    } else if (col === 'pct') {
      av = a.pct ?? -1; bv = b.pct ?? -1;
    } else if (col === 'wcl') {
      av = wclData[normalizeName(a.name)]?.medianPerf ?? -1;
      bv = wclData[normalizeName(b.name)]?.medianPerf ?? -1;
    } else { // attendance (count)
      av = a.attended; bv = b.attended;
    }
    if (av < bv) return dir === 'asc' ? -1 : 1;
    if (av > bv) return dir === 'asc' ? 1 : -1;
    return 0;
  });

  return [...withPct, ...noPct, ...inactive];
}

function toggleRole(safeId) {
  const body = document.getElementById('rolebody-' + safeId);
  const arrow = document.getElementById('roletoggle-' + safeId);
  if (!body) return;
  const collapsed = body.style.display === 'none';
  body.style.display = collapsed ? '' : 'none';
  if (arrow) arrow.textContent = collapsed ? '▾' : '▸';
}

function setSort(safeId, roleName, col) {
  const cur = roleSortState[roleName] || { col: 'priority', dir: 'desc' };
  const dir = cur.col === col ? (cur.dir === 'desc' ? 'asc' : 'desc') : 'desc';
  roleSortState[roleName] = { col, dir };
  const tbody = document.getElementById('table-' + safeId);
  if (!tbody) return;
  const role = lastRenderData.roles.find(r => r.name === roleName);
  if (!role) return;
  renderRoleBody(tbody, role, lastRenderData.dates, lastRenderData.thresholds[roleName]);
  // Update header arrows
  const thead = document.getElementById('thead-' + safeId);
  if (!thead) return;
  const state = roleSortState[roleName];
  thead.querySelectorAll('th[data-col]').forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    if (!arrow) return;
    arrow.textContent = th.dataset.col === state.col ? (state.dir === 'desc' ? ' ▾' : ' ▴') : ' ⬦';
  });
}




function priorityColor(score) {
  // 100 / 90+ / 60+ / 30+ / <30
  if (score >= 100) return C1;
  if (score >= 90)  return C2;
  if (score >= 60)  return C3;
  if (score >= 30)  return C4;
  return C5;
}

function pctColor(pct) {
  // 100 / 90+ / 75+ / 50+ / <50  (used for attendance & consumes & dots)
  if (pct >= 100) return C1;
  if (pct >= 90)  return C2;
  if (pct >= 75)  return C3;
  if (pct >= 50)  return C4;
  return C5;
}

function gearColor(count) {
  // 0=none, 1 / 2 / 3-4 / 5+
  if (count <= 0) return C1;
  if (count === 1) return C2;
  if (count === 2) return C3;
  if (count === 3) return C4;
  return C5; // 4+
}

function calculatePriority(p, bottom20threshold, top20threshold, pointValues) {
  // Must have attended more than 2 raids
  if (!p.pct || p.attended < 2) return { score: 0, tooltip: 'Insufficient raids attended' };

  // Attendance score: floor(pct/10) * raids attended
  const attFloor = Math.floor(p.pct / 10);
  const attScore = attFloor * p.attended;

  // Consume modifier: 1 / (1 + missingConsumePct/100)
  const playerBuffScores = buffScoreByPlayerDate[normalizeName(p.name)] || {};
  const consumeScores = Object.values(playerBuffScores).map(v => v?.total).filter(v => v !== null);
  const avgConsume = consumeScores.length ? consumeScores.reduce((a, b) => a + b, 0) / consumeScores.length : 100;
  const missingConsume = Math.max(0, 100 - avgConsume);
  const consumeMod = 1 / (1 + missingConsume / 100);

  // Gear modifier: 1 / (1 + 0.1 * gearIssues)
  const gi = latestGearIssuesByPlayer[normalizeName(p.name)];
  const gearIssueCount = gi?.issues?.length || 0;
  const gearMod = 1 / (1 + 0.1 * gearIssueCount);

  // Loot score modifier — 5 tiers based on points position within role
  const pts = pointsByPlayer[normalizeName(p.name)] ?? 0;
  const maxPts = pointValues.length > 0 ? pointValues[pointValues.length - 1] : 0;
  const nonZeroPts = pointValues.filter(v => v > 0);
  const minNonZeroPts = nonZeroPts.length > 0 ? nonZeroPts[0] : null;
  const isHighest = pointValues.length > 0 && pts === maxPts && pts > 0;
  const hasZeros = pointValues.some(v => v === 0);
  const isZeroOrLowest = pts === 0 || (!hasZeros && minNonZeroPts !== null && pts === minNonZeroPts);
  const isTop20 = !isHighest && !isZeroOrLowest && pts >= top20threshold && pointValues.length > 0;
  const isBottom20 = !isHighest && !isZeroOrLowest && pts <= bottom20threshold && pointValues.length > 0;
  const lootMod = isHighest ? 0.3 : isTop20 ? 0.4 : isBottom20 ? 0.6 : isZeroOrLowest ? 0.7 : 0.5;
  const lootTier = isHighest ? 'Highest in role (×0.3)' : isTop20 ? 'Top 20% (×0.4)' : isBottom20 ? 'Bottom 20% (×0.6)' : isZeroOrLowest ? 'Zero/lowest (×0.7)' : 'Mid 60% (×0.5)';

  const score = attScore * consumeMod * gearMod * lootMod;

  const tooltip = [
    `Attendance: floor(${p.pct.toFixed(1)}%/10)×${p.attended} = ${attScore}`,
    `Consume mod: 1/(1+${missingConsume.toFixed(1)}%) = ×${consumeMod.toFixed(3)}`,
    `Gear mod: 1/(1+0.1×${gearIssueCount}) = ×${gearMod.toFixed(3)}`,
    `Loot mod: ${lootTier}`,
  ].join('&#10;');

  return { score, tooltip };
}

function groupPlayers(allPlayers) {
  if (groupingMode === 'role') return lastRenderData.roles;

  const groups = GROUPINGS[groupingMode];
  return groups.map(g => {
    const players = allPlayers.filter(p => {
      const cls = classMap[normalizeName(p.name)];
      return cls && g.classes.map(c => c.toLowerCase()).includes(cls.toLowerCase());
    });
    const subtitle = GROUPING_SUBTITLES[groupingMode][g.name];
    return { name: g.name, subtitle, players };
  });
}

function getRoleRowsHtml(sorted, dates, bottom20threshold, top20threshold, pointValues, priorityNorm = 1) {
  let html = '';
  for (const p of sorted) {
      const cls = pctClass(p.pct);
      const pctStr = p.pct !== null ? (p.pct % 1 === 0 ? p.pct.toFixed(0) : p.pct.toFixed(1)) + '%' : 'N/A';
      const barWidth = p.pct !== null ? p.pct : 0;

      // Raid dots — show the 10 most recent raids only
      const playerBuffScores = buffScoreByPlayerDate[normalizeName(p.name)] || {};
      const MAX_DOTS = 10;
      const dotStart = Math.max(0, p.n - MAX_DOTS); // always show last 10
      let dotsHtml = '<div class="raid-dots">';
      for (let i = dotStart; i < p.n; i++) {
        const dateLabel = normalizeDate(dates[i]);
        if (p.pct === null) {
          dotsHtml += `<div class="raid-dot absent" title="${dates[i]}"></div>`;
        } else if (i < p.first || i > p.last) {
          dotsHtml += `<div class="raid-dot inactive"></div>`;
        } else if (!p.flags[i]) {
          dotsHtml += `<div class="raid-dot absent" title="${dates[i]}: Absent"></div>`;
        } else {
          const buffScore = playerBuffScores[dateLabel] ?? null;
          const buffPct = buffScore?.total ?? null;
          const scrollsPct = buffScore?.scrolls ?? 0;
          const isPerfect = buffPct === 100 && scrollsPct === 100;
          let dotTitle = `${dates[i]}: Present`;
          if (buffPct !== null) {
            dotTitle += ` | Buffs: ${buffPct}%`;
            const missing = [];
            if ((buffScore.elixir ?? 100) < 100) missing.push(`Elixir/Flask: ${buffScore.elixir}%`);
            if ((buffScore.food   ?? 100) < 100) missing.push(`Food: ${buffScore.food}%`);
            if ((buffScore.wepOil ?? 100) < 100) missing.push(`Wep Oil: ${buffScore.wepOil}%`);
            if (missing.length) dotTitle += '&#10;Missing: ' + missing.join(', ');
          }
          if (isPerfect) {
            const col = '#4caa6e';
            dotsHtml += `<span class="raid-star" style="color:${col};" title="${dotTitle}">★</span>`;
          } else {
            const col = buffPct !== null ? pctColor(buffPct) : null;
            const bgStyle = col ? `background:${col};border-color:${col};` : '';
            dotsHtml += `<div class="raid-dot present" style="${bgStyle}" title="${dotTitle}"></div>`;
          }
        }
      }
      dotsHtml += '</div>';

      html += `
        ${(() => {
        const pts = pointsByPlayer[normalizeName(p.name)] ?? 0;
        const isBottom = !p.inactive && p.pct !== null && p.attended >= 2 && pts <= bottom20threshold && pointValues.length > 0;
        const isTop = !p.inactive && p.pct !== null && p.attended >= 2 && pts >= top20threshold && pointValues.length > 0;
        const ptClass = isTop ? 'pts-top' : isBottom ? 'pts-bottom' : '';
        const { score: prScore } = calculatePriority(p, bottom20threshold, top20threshold, pointValues);
        const prNorm = prScore * priorityNorm;
        const prBg = prNorm >= 100 ? 'rgba(76,170,110,0.08)' : prNorm >= 90 ? 'rgba(138,191,80,0.07)' : prNorm >= 60 ? 'rgba(212,200,74,0.06)' : prNorm >= 30 ? 'rgba(224,120,48,0.06)' : prScore > 0 ? 'rgba(201,76,76,0.06)' : '';
        return `<tr class="${p.pct === null ? 'na-row' : ''}${p.inactive ? ' inactive-row' : ''}" style="${prBg ? 'background:' + prBg + ';' : ''}">
          <td class="player-name" onclick="toggleLoot(this, '${p.name}')" style="cursor:pointer;" title="Click to view loot"><span style="${(() => { const cc = classColor(p.name); return cc ? 'color:' + cc + ';' : ''; })()}">${p.name}</span>${groupingMode !== 'role' ? ` <span class="role-icon" title="${playerRoleName(p.name)}">${playerRoleIcon(p.name)}</span>` : ''} <span class="loot-arrow">▸</span></td>
          <td class="priority-cell">${(() => {
            const { score, tooltip } = calculatePriority(p, bottom20threshold, top20threshold, pointValues);
            if (!score) return '<span style="color:var(--text-dim);font-style:italic;font-size:12px;">—</span>';
            const normScore = Math.round(score * priorityNorm * 10) / 10;
            const col = priorityColor(normScore);
            const displayStr = normScore % 1 === 0 ? normScore.toFixed(0) : normScore.toFixed(1);
            const fullTip = tooltip + `&#10;Score: ${score.toFixed(2)}`;
            return `<span class="priority-score" style="color:${col};" title="${fullTip}">${displayStr}</span>`;
          })()}</td>
          <td class="gear-flag-cell">${(() => {
            const gi = latestGearIssuesByPlayer[normalizeName(p.name)];
            if (!gi || !gi.issues.length) return '';
            const count = gi.issues.length;
            const col = gearColor(count);
            const tooltip = gi.issues.join('&#10;');
            return `<span class="gear-flag" style="color:${col};filter:drop-shadow(0 0 4px ${col}88);" title="${tooltip}">⚠</span>`;
          })()}</td>
          <td class="points-cell" style="${(() => {
            const maxP = pointValues.length > 0 ? pointValues[pointValues.length - 1] : 0;
            const nzP  = pointValues.filter(v => v > 0);
            const minNzP = nzP.length > 0 ? nzP[0] : null;
            const hi  = pointValues.length > 0 && pts === maxP && pts > 0;
            const hasZerosInRole = nzP.length < pointValues.length;
            const zlo = pts === 0 || (!hasZerosInRole && minNzP !== null && pts === minNzP);
            const t20 = !hi && !zlo && pts >= top20threshold && pointValues.length > 0;
            const b20 = !hi && !zlo && pts <= bottom20threshold && pointValues.length > 0;
            const col = hi ? C5 : t20 ? C4 : b20 ? C2 : zlo ? C1 : C3;
            return `color:${col};`;
          })()}">${pts}</td>
          <td style="text-align:center;" class="wcl-col" data-wcl-key="${normalizeName(p.name)}">${(() => {
            const wcl = wclData[normalizeName(p.name)];
            if (!wcl || wcl.medianPerf === null || wcl.medianPerf === undefined) {
              const sName = (canonicalNames[normalizeName(p.name)] || p.name).toLowerCase();
              const sHref = `https://fresh.warcraftlogs.com/character/us/dreamscythe/${encodeURIComponent(sName)}`;
              return `<a href="${sHref}" target="_blank" rel="noopener" style="text-decoration:none;"><span class="wcl-spinner"></span></a>`;
            }
            return wclCellHtml(wcl, p.name);
          })()}</td>
          <td class="consumes-cell">${(() => {
            const scores = Object.values(buffScoreByPlayerDate[normalizeName(p.name)] || {}).map(v => v?.total).filter(v => v !== null);
            if (!scores.length) return '<span style="color:var(--text-dim);font-style:italic;font-size:13px;">—</span>';
            const avg = scores.reduce((a, b) => a + b, 0) / scores.length;
            const avgRound = Math.round(avg);
            let col = pctColor(avgRound);
            return `<span style="font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:${col};">${avgRound}%</span>`;
          })()}</td>
          <td `;
      })()}
          <td>${dotsHtml}</td>
          <td class="att-count">${p.attended}</td>
          <td>
            <div class="att-cell">
              <div class="att-bar-bg"><div class="att-bar-fill ${cls}" style="width:${barWidth}%"></div></div>
              <span class="att-pct ${cls}">${pctStr}</span>
            </div>
          </td>
        </tr>
      `;
  }
  return html;
}

function renderRoleBody(tbody, role, dates, thresholds) {
  const { bottom20threshold, top20threshold, pointValues } = thresholds;
  const sorted = getSortedPlayers(role.name, role.players, bottom20threshold, top20threshold, pointValues);
  const allPriorityScores = sorted
    .filter(p => p.pct !== null && !p.inactive && p.attended >= 2)
    .map(p => calculatePriority(p, bottom20threshold, top20threshold, pointValues).score)
    .filter(s => s > 0);
  const maxPriority = allPriorityScores.length > 0 ? Math.max(...allPriorityScores) : 1;
  const priorityNorm = maxPriority > 0 ? 100 / maxPriority : 1;
  tbody.innerHTML = getRoleRowsHtml(sorted, dates, bottom20threshold, top20threshold, pointValues, priorityNorm);
}

function pctClass(pct) {
  if (pct === null) return 'na';
  if (pct >= 100) return 'exact100';
  if (pct >= 90)  return 'high';
  if (pct >= 75)  return 'mid';
  if (pct >= 50)  return 'low';
  return 'low';
}
// Inline colour for attendance bar text
function attPctColor(pct) { return pct === null ? '' : pctColor(pct); }

function render({ dates, roles }) {
  const out = document.getElementById('output');

  // Store for re-render on sort
  const allPlayers = roles.flatMap(r => r.players);
  lastRenderData = { roles, dates, thresholds: {}, allPlayers };

  // Avg consumes (weighted by raids attended)
  let _totalWeighted = 0, _totalWeight = 0;
  roles.flatMap(r => r.players).filter(p => p.pct !== null && !p.inactive && p.attended >= 2).forEach(p => {
    const scores = Object.values(buffScoreByPlayerDate[normalizeName(p.name)] || {}).map(v => v?.total).filter(v => v !== null);
    if (!scores.length) return;
    const playerAvg = scores.reduce((a, b) => a + b, 0) / scores.length;
    _totalWeighted += playerAvg * p.attended;
    _totalWeight += p.attended;
  });
  const avgConsumeStr = _totalWeight > 0 ? (_totalWeighted / _totalWeight).toFixed(1) + '%' : '—';

  // Summary stats
  const activePlayers = roles.flatMap(r => r.players).filter(p => p.pct !== null && !p.inactive);
  const avgPct = activePlayers.length ? activePlayers.reduce((s, p) => s + p.pct, 0) / activePlayers.length : 0;
  const perfect = activePlayers.filter(p => p.pct === 100).length;
  const active = activePlayers.length;
  const total = roles.flatMap(r => r.players).filter(p => p.name).length;

  let html = '';

  const displayGroups = groupingMode === 'role' ? roles : groupPlayers(allPlayers);
  for (const role of displayGroups) {
    if (!role.players.length) continue;

    // Calculate top/bottom 20% thresholds — active, non-inactive players with >2 raids only
    const roleActive = role.players.filter(p => p.pct !== null && !p.inactive && p.attended >= 2);
    const rolePoints = roleActive.map(p => pointsByPlayer[normalizeName(p.name)] ?? 0).sort((a, b) => a - b);
    const bottom20threshold = rolePoints.length > 0 ? rolePoints[Math.floor(rolePoints.length * 0.2)] : 0;
    const top20threshold = rolePoints.length > 0 ? rolePoints[Math.floor(rolePoints.length * 0.8)] : Infinity;
    const pointValues = rolePoints;
    lastRenderData.thresholds[role.name] = { bottom20threshold, top20threshold, pointValues };

    const roleSafeId = role.name.replace(/\s+/g, '-');
    const sorted = getSortedPlayers(role.name, role.players, bottom20threshold, top20threshold, pointValues);
    const state = roleSortState[role.name] || { col: 'priority', dir: 'desc' };

    html += `
    <div class="role-section">
      <div class="role-header" onclick="toggleRole('${roleSafeId}')" style="cursor:pointer;">
        <span class="role-title">${groupingMode === 'role' && ROLE_ICONS[role.name] ? ROLE_ICONS[role.name] + ' ' : ''}${ROLE_DISPLAY_NAMES[role.name] || role.name}${role.subtitle ? '<span class="role-subtitle"> — ' + role.subtitle + '</span>' : ''}</span>
        <div class="role-line"></div>
        <span class="role-count">${sorted.filter(p=>p.pct!==null && !p.inactive).length} active <span class="role-toggle" id="roletoggle-${roleSafeId}">▾</span></span>
      </div>
      <div class="role-body" id="rolebody-${roleSafeId}">
      <table>
        <colgroup>
          <col style="width:16ch;min-width:16ch;"> <!-- Player -->
          <col style="width:70px;">  <!-- Priority -->
          <col style="width:24px;">  <!-- Gear flag -->
          <col style="width:64px;">  <!-- Loot Score -->
          <col style="width:70px;" class="wcl-col">  <!-- WCL -->
          <col style="width:80px;">  <!-- Consumes -->
          <col>                      <!-- Raids (dots) -->
          <col style="width:50px;">  <!-- # -->
          <col style="width:140px;"> <!-- Attendance % -->
        </colgroup>
        <thead id="thead-${roleSafeId}">
          <tr>
            <th data-col="player" onclick="setSort('${roleSafeId}', '${role.name}', 'player')" style="cursor:pointer;">Player<span class="sort-arrow">${state.col==='player' ? (state.dir==='desc' ? ' ▾' : ' ▴') : ' ⬦'}</span></th>
            <th data-col="priority" onclick="setSort('${roleSafeId}', '${role.name}', 'priority')" style="cursor:pointer;text-align:center;" title="Loot priority recommendation based on raid attendance, consume usage, and loot received.">Priority<span class="sort-arrow">${state.col==='priority' ? (state.dir==='desc' ? ' ▾' : ' ▴') : ' ⬦'}</span></th>
            <th></th>
            <th data-col="points" onclick="setSort('${roleSafeId}', '${role.name}', 'points')" style="cursor:pointer;text-align:center;" title="Amount of loot received relative to raids attended.">Loot Score<span class="sort-arrow">${state.col==='points' ? (state.dir==='desc' ? ' ▾' : ' ▴') : ' ⬦'}</span></th>
            <th data-col="wcl" onclick="setSort('${roleSafeId}', '${role.name}', 'wcl')" style="cursor:pointer;text-align:center;" class="wcl-col">WCL<span class="sort-arrow">${state.col==='wcl' ? (state.dir==='desc' ? ' ▾' : ' ▴') : ' ⬦'}</span></th>
            <th data-col="consumes" onclick="setSort('${roleSafeId}', '${role.name}', 'consumes')" style="cursor:pointer;text-align:center;" title="Uptime of all required consumables.">Consumes<span class="sort-arrow">${state.col==='consumes' ? (state.dir==='desc' ? ' ▾' : ' ▴') : ' ⬦'}</span></th>

        <tbody id="table-${roleSafeId}">

    // Calculate priority normalisation factor: X = 100 / maxPriority so highest = 100
    const allPriorityScores = sorted
      .filter(p => p.pct !== null && !p.inactive && p.attended >= 2)
      .map(p => calculatePriority(p, bottom20threshold, top20threshold, pointValues).score)
      .filter(s => s > 0);
    const maxPriority = allPriorityScores.length > 0 ? Math.max(...allPriorityScores) : 1;
    const priorityNorm = maxPriority > 0 ? 100 / maxPriority : 1;

    const rowsHtml = getRoleRowsHtml(sorted, dates, bottom20threshold, top20threshold, pointValues, priorityNorm);

  html += `

      <div class="summary-item"><label>Avg Attendance</label><div class="val">${avgPct.toFixed(1)}%</div></div>
      <div class="summary-item"><label>Avg Consumes</label><div class="val">${avgConsumeStr}</div></div>
      <div class="summary-item"><label># Raids</label><div class="val">${dates.length}</div></div>
      
    </div>
  `;

  out.innerHTML = html;
  setTimeout(() => { if (typeof $WowheadPower !== 'undefined' && $WowheadPower.refreshLinks) $WowheadPower.refreshLinks(); }, 200);
}

function toggleLoot(td, playerName) {
  const tr = td.closest('tr');
  const arrow = td.querySelector('.loot-arrow');
  const existing = tr.nextElementSibling;

  // If already open, close it
  if (existing && existing.classList.contains('loot-row')) {
    existing.remove();
    arrow.textContent = '▸';
    return;
  }

  const key = normalizeName(playerName);
  const items = (lootByPlayer[key] || []).map(i => typeof i === 'object' ? i : { name: i, value: 0 });

  const lootTr = document.createElement('tr');
  lootTr.className = 'loot-row';
  const colspan = tr.children.length;

  const cla = claDataByPlayer[key] || { gearIssues: [], buffConsumables: [] };

  let html = `<td colspan="${colspan}" class="loot-cell">`;

  // Loot section
  html += `<div class="expand-section-title">Loot Received</div>`;
  if (!items || items.length === 0) {
    html += `<em class="no-loot">No loot recorded</em>`;
  } else {
    html += `<div class="loot-list">${items.map(({name, value}) => {
    const col = lootValueColor(value);
    return `<span class="loot-item" style="border-color:${col};background:${col}18;">${itemLink(name, name)}</span>`;
  }).join('')}</div>`;
  }

  html += `</td>`;
  lootTr.innerHTML = html;
  setTimeout(() => { if (typeof $WowheadPower !== 'undefined' && $WowheadPower.refreshLinks) $WowheadPower.refreshLinks(); }, 200);

  tr.after(lootTr);
  arrow.textContent = '▾';
  // Ensure icons are fetched for any newly visible loot items
  fetchItemIcons().then(() => {
    if (typeof $WowheadPower !== 'undefined' && $WowheadPower.refreshLinks) $WowheadPower.refreshLinks();
  });
}

  const el = document.getElementById('claPersist');
  if (el) el.value = JSON.stringify(claSheets);
}

function loadClaSheets() {
  // Try sessionStorage first, then hidden field
  try {
    const ss = sessionStorage.getItem('claSheets');
    if (ss) return JSON.parse(ss);
  } catch(e) {}
  try {
    const el = document.getElementById('claPersist');
    if (el && el.value) return JSON.parse(el.value);
  } catch(e) {}
  return [];
}

  const m = url.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}

// Gear listing slot columns (matches CSV header row)
const GEAR_LISTING_SLOTS = ['Head','Neck','Shoulders','Cloak','Chest','Bracers','Hands','Waist','Legs','Feet','Ring1','Ring2','Trinket1','Trinket2','Weapon','Off-Hand','Wand/Idol/Relic etc.'];

// Parse gear listing CSV -> { playerName: { Head: 'itemname', Neck: 'itemname', ... } }
function parseGearListing(csvText) {
  const rows = csvText.split('\n').map(r => {
    const cols = [];
    let cur = '', inQ = false;
    for (const ch of r) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  });
  // Find header row (contains 'Head')
  const headerIdx = rows.findIndex(r => r.some(c => c === 'Head'));
  if (headerIdx === -1) return {};
  const slotCols = rows[headerIdx]; // col 0=empty, col 1=empty, col 2=Head, ...
  const result = {};
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const row = rows[i];
    const name = row[1]?.trim();
    if (!name) continue;
    const gear = {};
    for (let s = 0; s < GEAR_LISTING_SLOTS.length; s++) {
      const itemName = row[s + 2]?.trim();
      if (itemName) gear[GEAR_LISTING_SLOTS[s]] = itemName;
    }
    result[name] = gear;
  }
  return result;
}

// Look up a single item name via Apps Script -> Wowhead search XML
async function lookupItemId(itemName) {
  try {
    const rawUrl = APPS_SCRIPT + '?action=itemLookup&name=' + encodeURIComponent(itemName);
    const text = await proxyFetch(rawUrl);
    const data = JSON.parse(text);
    if (data.id) return data.id;
    console.warn('No ID returned for:', itemName, data);
    return null;
  } catch(e) {
    console.warn('lookupItemId failed for:', itemName, e.message);
    return null;
  }
}

// Save gear-item-ids.json to GitHub
async function saveGearItemIdsToGitHub() {
  if (!githubToken) return;
  try {
    const apiUrl = `https://api.github.com/repos/${GITHUB_REPO}/contents/${GEAR_IDS_FILE}`;
    let sha = null;
    try {
      const getRes = await fetch(apiUrl, {
        headers: { Authorization: `token ${githubToken}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (getRes.ok) sha = (await getRes.json()).sha;
    } catch(e) {}

    const body = {
      message: `Update gear item IDs - ${new Date().toLocaleDateString()}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(gearItemIds, null, 2)))),
      ...(sha ? { sha } : {})
    };
    await fetch(apiUrl, {
      method: 'PUT',
      headers: { Authorization: `token ${githubToken}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    console.log('Saved gear-item-ids.json to GitHub');
  } catch(e) {
    console.warn('Failed to save gear-item-ids.json:', e.message);
  }
}

// Fetch gear listing tab, find unknown item names, look them up, save to repo
async function processGearListingForItemIds(sheetId, gearListingGid) {
  setHint('Looking up gear item IDs...', '');
  try {
    const text = await fetchSheet(sheetId, gearListingGid);
    const gearData = parseGearListing(text);
    const allItems = new Set();
    Object.values(gearData).forEach(slots => Object.values(slots).forEach(name => allItems.add(name)));

    const unknown = [...allItems].filter(name => !gearItemIds[name.toLowerCase()]);
    if (!unknown.length) {
      setHint('All gear items already in map!', 'success');
      return;
    }

    console.log('Looking up', unknown.length, 'unknown gear items via Wowhead...');
    setHint(`Looking up ${unknown.length} new item IDs...`, '');

    // Process in small batches to avoid rate limiting
    let found = 0;
    for (let i = 0; i < unknown.length; i += 3) {
      const batch = unknown.slice(i, i + 3);
      await Promise.all(batch.map(async name => {
        const id = await lookupItemId(name);
        if (id) {
          gearItemIds[name.toLowerCase()] = id;
          found++;
        }
      }));
      if (i + 3 < unknown.length) await new Promise(r => setTimeout(r, 400));
    }

    if (found > 0) {
      await saveGearItemIdsToGitHub();
      setHint(`✓ Added ${found} / ${unknown.length} gear item IDs to map`, 'success');
    } else {
      setHint(`⚠ No item IDs resolved (${unknown.length} unknown) — check console`, 'error');
    }
  } catch(e) {
    console.warn('processGearListingForItemIds error:', e.message);
    setHint('Gear ID lookup failed: ' + e.message, 'error');
  }
}

async function fetchAllClaData() {
  claDataByPlayer = {};
  buffScoreByPlayerDate = {};
  latestGearIssuesByPlayer = {};
  claSheetDates = {};
  canonicalNames = {};

  // Fetch all CLA sheets in parallel, collecting raw gear results first
  const gearResults = []; // { label, text } in fetch-completion order

  await Promise.all(claSheets.flatMap(sheet => [
    fetchSheet(sheet.sheetId, sheet.gearGid)
      .then(text => gearResults.push({ label: sheet.label, text }))
      .catch(e => addError(`CLA "${sheet.label}" — Gear Issues (gid: ${sheet.gearGid})`, e.message)),
    fetchSheet(sheet.sheetId, sheet.buffGid)
      .then(text => {
        try { parseBuffConsumables(text, sheet.label); }
        catch(e) { addError(`CLA "${sheet.label}" — Buff Consumables (gid: ${sheet.buffGid})`, `Parse error: ${e.message}`); }
      })
      .catch(e => addError(`CLA "${sheet.label}" — Buff Consumables (gid: ${sheet.buffGid})`, e.message)),
  ]));

  // Now that claSheetDates is fully populated, parse gear issues with correct recency
  for (const { label, text } of gearResults) {
    try { parseGearIssues(text, label); }
    catch(e) { addError(`CLA "${label}" — Gear Issues`, `Parse error: ${e.message}`); }
  }
}


function parseGearIssues(text, label) {
  const rows = parseCsvRows(text);
  const FLAGGED = /\[no (gem|enchant)/i;
  for (const row of rows) {
    const player = row[4]?.trim();
    if (!player) continue;
    // Filter to only [no gem] or [no enchant] issues, skip dashes
    const issues = row.slice(5)
      .map(v => v.trim())
      .filter(v => v && FLAGGED.test(v));
    const key = normalizeName(player);
    if (!claDataByPlayer[key]) claDataByPlayer[key] = { gearIssues: [], buffConsumables: [] };
    // Store all for expand panel (now removed, but keep structure)
    if (issues.length) claDataByPlayer[key].gearIssues.push({ label, issues });
    // Only overwrite if this sheet is more recent than what we have
    // Use C3 date from buff tab if available, otherwise fall back to claSheets array order
    const thisDate = claSheetDates[label] || null;
    const existingLabel = latestGearIssuesByPlayer[key]?.label;
    const existingDate = existingLabel ? (claSheetDates[existingLabel] || null) : null;
    let isNewer;
    if (thisDate && existingDate) {
      isNewer = thisDate >= existingDate;
    } else {
      // Fall back to array index order
      const sheetIdx = claSheets.findIndex(s => s.label === label);
      const existingIdx = existingLabel ? claSheets.findIndex(s => s.label === existingLabel) : -1;
      isNewer = sheetIdx >= existingIdx;
    }
    if (isNewer) {
      latestGearIssuesByPlayer[key] = { label, issues };
    }
  }
}

function parseBuffConsumables(text, label) {
  const rows = parseCsvRows(text);
  // C3 (row index 2, col index 2) contains the raid date for this CLA
  const dateStr = rows[2]?.[2]?.trim();
  if (dateStr) {
    const parsed = new Date(dateStr);
    if (!isNaN(parsed)) claSheetDates[label] = parsed;
  }
  // Header row is row index 4 (0-based), data starts at row 5
  const headers = rows[4]?.slice(2) || []; // col C onwards
  const normLabel = normalizeDate(label);
  for (let i = 5; i < rows.length; i++) {
    const row = rows[i];
    const player = row[1]?.trim();
    if (!player) continue;
    const values = row.slice(2);
    const cols = {};
    headers.forEach((h, idx) => {
      if (h.trim()) cols[h.trim()] = values[idx]?.trim() || '0%';
    });
    const key = normalizeName(player);
    if (!claDataByPlayer[key]) claDataByPlayer[key] = { gearIssues: [], buffConsumables: [] };
    claDataByPlayer[key].buffConsumables.push({ label, cols });
    // Store exact name with special chars for WCL lookups
    if (!canonicalNames[key]) canonicalNames[key] = player;

    // Store total average + scrolls score keyed by normalized date for dot colouring
    const totalAvg = values[0]?.trim() || '0%'; // col C = index 0 of slice(2) = total average
    const scrollsVal = values[6]?.trim() || '0%'; // col I = index 6 of slice(2) = Scrolls
    const pct = parseInt(totalAvg);
    const scrollsPct = parseInt(scrollsVal);
    if (!buffScoreByPlayerDate[key]) buffScoreByPlayerDate[key] = {};
    const elixirVal  = parseInt(values[1]?.trim()) || 0;  // Elixir or Flask
    const foodVal     = parseInt(values[5]?.trim()) || 0;  // Food Buff
    const wepOilVal   = parseInt(values[7]?.trim()) || 0;  // Weapon Enhancement
    buffScoreByPlayerDate[key][normLabel] = {
      total: isNaN(pct) ? null : pct,
      scrolls: isNaN(scrollsPct) ? 0 : scrollsPct,
      elixir: elixirVal,
      food: foodVal,
      wepOil: wepOilVal
    };
  }
}

// ── Custom Tooltip System ───────────────────────────────────────
// Works on desktop (hover) and mobile (long-press)
// Replaces native title= tooltips with a styled custom tooltip

const tooltipEl = document.createElement('div');
tooltipEl.id = 'custom-tooltip';
document.body.appendChild(tooltipEl);

let longPressTimer = null;
let activeTooltipTarget = null;

function showTooltip(text, x, y) {
  if (!text) return;
  tooltipEl.textContent = text.replace(/&#10;/g, '\n');
  tooltipEl.classList.add('visible');
  positionTooltip(x, y);
}

function positionTooltip(x, y) {
  const pad = 12;
  const tw = tooltipEl.offsetWidth;
  const th = tooltipEl.offsetHeight;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  let left = x + pad;
  let top  = y + pad;
  if (left + tw > vw - pad) left = x - tw - pad;
  if (top  + th > vh - pad) top  = y - th - pad;
  tooltipEl.style.left = Math.max(pad, left) + 'px';
  tooltipEl.style.top  = Math.max(pad, top)  + 'px';
}

function hideTooltip() {
  tooltipEl.classList.remove('visible');
}

function getTitleText(el) {
  let cur = el;
  while (cur && cur !== document.body) {
    // Check both real title and our stashed data attribute
    const stashed = cur.getAttribute('data-title-stash');
    if (stashed) return stashed;
    const t = cur.getAttribute('title');
    if (t) return t;
    cur = cur.parentElement;
  }
  return null;
}

// Track which element we stripped title from so we can restore it
let strippedEl = null;
let strippedTitle = '';

function getTitleEl(el) {
  let cur = el;
  while (cur && cur !== document.body) {
    if (cur.hasAttribute('title') && cur.getAttribute('title')) return cur;
    cur = cur.parentElement;
  }
  return null;
}

// Desktop: hover
document.addEventListener('mouseover', e => {
  const el = getTitleEl(e.target);
  if (el) {
    // Strip title to prevent native tooltip overlapping
    if (strippedEl && strippedEl !== el) {
      strippedEl.setAttribute('title', strippedTitle);
    }
    strippedTitle = el.getAttribute('title');
    strippedEl = el;
    el.setAttribute('data-title-stash', strippedTitle);
    el.setAttribute('title', '');
    showTooltip(strippedTitle, e.clientX, e.clientY);
  } else {
    hideTooltip();
  }
});
document.addEventListener('mousemove', e => {
  if (tooltipEl.classList.contains('visible')) positionTooltip(e.clientX, e.clientY);
});
document.addEventListener('mouseout', e => {
  const el = getTitleEl(e.relatedTarget);
  if (!el) {
    hideTooltip();
    // Restore stripped title
    if (strippedEl) {
      strippedEl.setAttribute('title', strippedTitle);
      strippedEl.removeAttribute('data-title-stash');
      strippedEl = null;
      strippedTitle = '';
    }
  }
});

// Mobile: long-press (500ms)
document.addEventListener('touchstart', e => {
  const text = getTitleText(e.target);
  if (!text) return;
  const touch = e.touches[0];
  longPressTimer = setTimeout(() => {
    showTooltip(text, touch.clientX, touch.clientY);
    activeTooltipTarget = e.target;
  }, 500);
}, { passive: true });

document.addEventListener('touchend', () => {
  clearTimeout(longPressTimer);
  // Keep tooltip visible briefly so user can read it
  setTimeout(hideTooltip, 5000);
}, { passive: true });

document.addEventListener('touchmove', () => {
  clearTimeout(longPressTimer);
  hideTooltip();
}, { passive: true });
