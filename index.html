  onItemChange();
}

function onItemChange() {
  const raid = document.getElementById('lootRaid').value;
  const boss = document.getElementById('lootBoss').value;
  const item = selectedItem;
  const el = document.getElementById('lootEligible');
  if (!item) { el.innerHTML = ''; return; }

  // Show item icon + link above the table
  const itemId = getItemId(item);
  const itemIconHtml = itemId && itemIcons[itemId]
    ? `<a href="https://www.wowhead.com/tbc/item=${itemId}" data-wowhead="item=${itemId}&dataset=tbc" target="_blank" rel="noopener" style="flex-shrink:0;"><img src="https://wow.zamimg.com/images/wow/icons/large/${itemIcons[itemId]}.jpg" style="width:40px;height:40px;border:2px solid var(--gold-dim);border-radius:4px;display:block;" /></a>`
    : '';
  const itemHeaderHtml = itemId
    ? `<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
        ${itemIconHtml}
        <a href="https://www.wowhead.com/tbc/item=${itemId}" data-wowhead="item=${itemId}&dataset=tbc" target="_blank" rel="noopener" style="font-family:'Cinzel',serif;font-size:16px;color:var(--gold);text-decoration:none;">${item}</a>
       </div>`
    : `<div style="margin-bottom:16px;font-family:'Cinzel',serif;font-size:16px;color:var(--gold);">${item}</div>`;

  const entry = glossaryData.find(r => r.raid === raid && r.boss === boss && r.item === item);
  if (!entry) { el.innerHTML = '<p style="color:var(--text-dim);font-style:italic;">No data found for this item.</p>'; return; }

  // Get all players across all roles
  const allPlayers = lastRenderData.roles.flatMap(r => r.players);

  // Filter to eligible players by class AND role
  const eligible = allPlayers.filter(p => {
    if (!p.name) return false;
    const cls = classMap[normalizeName(p.name)];
    if (!cls) return false;
    // Class check
    const classOk = entry.eligibleClasses.length === 0 ||
      entry.eligibleClasses.some(ec => ec.toLowerCase() === cls.toLowerCase());
    if (!classOk) return false;
    // Role check — find player's role from original role grouping
    const playerRole = lastRenderData.roles.find(r =>
      r.players.some(rp => normalizeName(rp.name) === normalizeName(p.name))
    )?.name;
    const roleOk = !entry.eligibleRoles || entry.eligibleRoles.length === 0 ||
      (playerRole && entry.eligibleRoles.includes(playerRole));
    return roleOk;
  });

  if (!eligible.length) {
    el.innerHTML = '<p style="color:var(--text-dim);font-style:italic;padding:16px 0;">No eligible players found for this item.</p>';
    return;
  }

  // Check who has already received this item
  const hasItem = p => (lootByPlayer[normalizeName(p.name)] || []).some(l => (l.name || l).toLowerCase() === item.toLowerCase());

  const haveIt = eligible.filter(p => hasItem(p));
  const needIt = eligible.filter(p => !hasItem(p) && !p.inactive);
  const inactiveNeedIt = eligible.filter(p => !hasItem(p) && p.inactive);

  // Get thresholds for all eligible players combined (treat as one group)
  const eligThreshPts = eligible
    .filter(p => p.pct !== null && !p.inactive && p.attended >= 2)
    .map(p => pointsByPlayer[normalizeName(p.name)] ?? 0)
    .sort((a, b) => a - b);
  const eligBottom20 = eligThreshPts.length ? eligThreshPts[Math.floor(eligThreshPts.length * 0.2)] : 0;
  const eligTop20 = eligThreshPts.length ? eligThreshPts[Math.floor(eligThreshPts.length * 0.8)] : Infinity;

  // Normalise priority scores within active eligible players only
  const prScores = needIt.map(p => calculatePriority(p, eligBottom20, eligTop20, eligThreshPts).score * prioMultiplier(p).mult);
  const maxPr = prScores.filter(s => s > 0).length ? Math.max(...prScores.filter(s => s > 0)) : 1;
  const prNormFactor = maxPr > 0 ? 100 / maxPr : 1;

  // Prio multiplier helper
  function prioMultiplier(p) {
    const cls = classMap[normalizeName(p.name)] || '';
    const role = lastRenderData.roles.find(r => r.players.some(rp => normalizeName(rp.name) === normalizeName(p.name)))?.name || '';
    const inList = (list) => list.some(v => v.toLowerCase() === cls.toLowerCase() || v.toLowerCase() === role.toLowerCase());
    const hard = entry.hardPrio && inList(entry.hardPrio);
    const soft = entry.softPrio && inList(entry.softPrio);
    return { mult: (hard ? 1.75 : 1) * (soft ? 1.25 : 1), hard, soft };
  }

  function lootPriorityScore(p) {
    const base = calculatePriority(p, eligBottom20, eligTop20, eligThreshPts).score;
    return base * prioMultiplier(p).mult;
  }

  // Sort needIt by selected column
  function getLootSortVal(p, col) {
    if (col === 'priority') return lootPriorityScore(p);
    if (col === 'points')   return pointsByPlayer[normalizeName(p.name)] ?? 0;
    if (col === 'wcl')      return wclData[normalizeName(p.name)]?.medianPerf ?? -1;
    if (col === 'consumes') {
      const sc = Object.values(buffScoreByPlayerDate[normalizeName(p.name)] || {}).map(v => v?.total).filter(v => v !== null);
      return sc.length ? sc.reduce((a,b)=>a+b,0)/sc.length : -1;
    }
    if (col === 'attendance') return p.attended;
    if (col === 'pct')      return p.pct ?? -1;
    if (col === 'player')   return p.name.toLowerCase();
    return 0;
  }
  needIt.sort((a, b) => {
    const av = getLootSortVal(a, lootSortCol);
    const bv = getLootSortVal(b, lootSortCol);
    if (av < bv) return lootSortDir === 'asc' ? -1 : 1;
    if (av > bv) return lootSortDir === 'asc' ? 1 : -1;
    return 0;
  });

  function lootPlayerRow(p, dimmed, badge) {
    const key = normalizeName(p.name);
    const cc = classColor(p.name);
    const nameStyle = cc ? `color:${cc};` : '';
    const pts = pointsByPlayer[key] ?? 0;

    // Priority
    const { score: prScore, tooltip: prTooltip } = calculatePriority(p, eligBottom20, eligTop20, eligThreshPts);
    const { mult, hard, soft } = prioMultiplier(p);
    const adjScore = prScore * mult;
    const normPr = Math.round(adjScore * prNormFactor * 10) / 10;
    const displayPr = normPr % 1 === 0 ? normPr.toFixed(0) : normPr.toFixed(1);
    const prStr = prScore > 0 ? displayPr : '—';
    const prCol = prScore > 0 ? priorityColor(normPr) : 'var(--text-dim)';
    const prioLines = [];
    if (hard) prioLines.push('Hard Prio (×1.75)');
    if (soft) prioLines.push('Soft Prio (×1.25)');
    const fullTooltip = prTooltip + (prioLines.length ? '&#10;' + prioLines.join('&#10;') : '') + `&#10;Score: ${adjScore.toFixed(2)}`;

    // Gear flag
    const gi = latestGearIssuesByPlayer[key];
    const gearHtml = (gi && gi.issues.length) ? `<span class="gear-flag" style="color:${gearColor(gi.issues.length)};filter:drop-shadow(0 0 4px ${gearColor(gi.issues.length)}88);" title="${gi.issues.join('&#10;')}">⚠</span>` : '';

    // Loot Score colour
    const maxP = eligThreshPts.length ? eligThreshPts[eligThreshPts.length - 1] : 0;
    const nzP = eligThreshPts.filter(v => v > 0);
    const minNzP = nzP.length ? nzP[0] : null;
    const hiPts = eligThreshPts.length && pts === maxP && pts > 0;
    const hasZerosElig = nzP.length < eligThreshPts.length;
    const zloPts = pts === 0 || (!hasZerosElig && minNzP !== null && pts === minNzP);
    const t20pts = !hiPts && !zloPts && pts >= eligTop20 && eligThreshPts.length > 0;
    const b20pts = !hiPts && !zloPts && pts <= eligBottom20 && eligThreshPts.length > 0;
    const ptsCol = hiPts ? C5 : t20pts ? C4 : b20pts ? C2 : zloPts ? C1 : C3;

    // Consumes
    const consumeScores = Object.values(buffScoreByPlayerDate[key] || {}).map(v => v?.total).filter(v => v !== null);
    const avgCon = consumeScores.length ? Math.round(consumeScores.reduce((a,b)=>a+b,0)/consumeScores.length) : null;
    const conStr = avgCon !== null ? `<span style="color:${pctColor(avgCon)};">${avgCon}%</span>` : '<span style="color:var(--text-dim);font-style:italic;">—</span>';

    // Attendance
    const pctStr = p.pct !== null ? (p.pct % 1 === 0 ? p.pct.toFixed(0) : p.pct.toFixed(1)) + '%' : 'N/A';
    const attCol = p.pct !== null ? pctColor(p.pct) : 'var(--text-dim)';
    const barW = p.pct !== null ? p.pct : 0;

    // Dots (last 10)
    const playerBuffScores = buffScoreByPlayerDate[key] || {};
    const MAX_DOTS = 10;
    const dates = lastRenderData.dates;
    const dotStart = Math.max(0, p.n - MAX_DOTS);
    let dotsHtml = '<div class="raid-dots">';
    for (let i = dotStart; i < p.n; i++) {
      const dateLabel = normalizeDate(dates[i]);
      if (p.pct === null) {
        dotsHtml += `<div class="raid-dot absent" title="${dates[i]}"></div>`;
      } else if (i < p.first || i > p.last) {
        dotsHtml += `<div class="raid-dot inactive"></div>`;
      } else if (!p.flags[i]) {
        dotsHtml += `<div class="raid-dot absent" title="${dates[i]}: Absent"></div>`;
      } else {
        const bs = playerBuffScores[dateLabel] ?? null;
        const bpct = bs?.total ?? null;
        const sp = bs?.scrolls ?? 0;
        const isPerfect = bpct === 100 && sp === 100;
        let dotTitle = `${dates[i]}: Present`;
        if (bpct !== null) {
          dotTitle += ` | Buffs: ${bpct}%`;
          const missing = [];
          if ((bs.elixir ?? 100) < 100) missing.push(`Elixir/Flask: ${bs.elixir}%`);
          if ((bs.food   ?? 100) < 100) missing.push(`Food: ${bs.food}%`);
          if ((bs.wepOil ?? 100) < 100) missing.push(`Wep Oil: ${bs.wepOil}%`);
          if (missing.length) dotTitle += '&#10;Missing: ' + missing.join(', ');
        }
        if (isPerfect) {
          dotsHtml += `<span class="raid-star" style="color:#4caa6e;" title="${dotTitle}">★</span>`;
        } else {
          const col = bpct !== null ? pctColor(bpct) : null;
          const bgStyle = col ? `background:${col};border-color:${col};` : '';
          dotsHtml += `<div class="raid-dot present" style="${bgStyle}" title="${dotTitle}"></div>`;
        }
      }
    }
    dotsHtml += '</div>';

    const rowBg = !dimmed && prScore > 0 ? (() => {
      const n = normPr;
      return n >= 100 ? 'rgba(76,170,110,0.08)' : n >= 90 ? 'rgba(138,191,80,0.07)' : n >= 60 ? 'rgba(212,200,74,0.06)' : n >= 30 ? 'rgba(224,120,48,0.06)' : 'rgba(201,76,76,0.06)';
    })() : '';

    return `<tr style="${dimmed ? 'opacity:0.35;' : ''}${rowBg ? 'background:' + rowBg + ';' : ''}" class="${dimmed ? 'na-row' : ''}">
      <td class="player-name" onclick="toggleLoot(this, '${p.name}')" style="cursor:pointer;" title="Click to view loot"><span style="${nameStyle}">${p.name}</span>${badge ? ` <span class="inactive-badge" style="font-size:9px;letter-spacing:0.1em;">${badge}</span>` : ''} <span class="loot-arrow">▸</span></td>
      <td class="priority-cell" style="color:${prCol};" title="${fullTooltip}">${prStr !== '—' ? `<span class="priority-score" style="color:${prCol};">${prStr}</span>` : '<span style="color:var(--text-dim);font-style:italic;font-size:12px;">—</span>'}</td>
      <td class="gear-flag-cell">${gearHtml}</td>
      <td class="points-cell" style="color:${ptsCol};text-align:center;">${pts}</td>
      <td style="text-align:center;" class="wcl-col" data-wcl-key="${key}">${(() => {
        const _w = wclData[key];
        if (_w) return wclCellHtml(_w, p.name);
        const _n = (canonicalNames[normalizeName(p.name)] || p.name).toLowerCase();
        return `<a href="https://fresh.warcraftlogs.com/character/us/dreamscythe/${encodeURIComponent(_n)}" target="_blank" rel="noopener" style="text-decoration:none;"><span class="wcl-spinner"></span></a>`;
      })()}</td>
      <td class="consumes-cell" style="text-align:center;">${conStr}</td>
      <td>${dotsHtml}</td>
      <td class="att-count" style="text-align:right;">${p.attended}</td>
      <td>
        <div class="att-cell">
          <div class="att-bar-bg"><div class="att-bar-fill ${attCol === '#4caa6e' ? 'exact100' : attCol === '#8abf50' ? 'high' : attCol === '#d4c84a' ? 'mid' : 'low'}" style="width:${barW}%"></div></div>
          <span class="att-pct" style="color:${attCol};">${pctStr}</span>
        </div>
      </td>
    </tr>`;
  }

  const thS = (label, col, align='center', extraClass='') =>
    `<th onclick="setLootSort('${col}')" class="${extraClass}" style="cursor:pointer;text-align:${align};padding:6px 12px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.2em;color:var(--text-dim);white-space:nowrap;" title="${col === 'priority' ? 'Loot priority recommendation based on raid attendance, consume usage, and loot received.' : col === 'points' ? 'Amount of loot received relative to raids attended.' : col === 'consumes' ? 'Uptime of all required consumables.' : col === 'attendance' ? 'Raids attended.' : ''}">${label}<span class="sort-arrow">${lootSortArrow(col)}</span></th>`;

  // Re-init Wowhead tooltips after DOM update
  el.innerHTML = itemHeaderHtml + `
    <table style="width:100%;border-collapse:collapse;margin-top:24px;">
      <colgroup>
        <col style="width:16ch;min-width:16ch;"> <!-- Player -->
        <col style="width:70px;">  <!-- Priority -->
        <col style="width:24px;">  <!-- Gear flag -->
        <col style="width:80px;">  <!-- Loot Score -->
        <col style="width:70px;" class="wcl-col">  <!-- WCL -->
        <col style="width:80px;">  <!-- Consumes -->
        <col>                      <!-- Raids (dots) -->
        <col style="width:50px;">  <!-- # -->
        <col style="width:140px;"> <!-- Attendance % -->
      </colgroup>
      <thead>
        <tr style="border-bottom:1px solid var(--border);">
          ${thS('Player','player','left')}
          ${thS('Priority','priority')}
          <th style="padding:6px 12px;"></th>
          ${thS('Loot Score','points')}
          ${thS('WCL','wcl','center','wcl-col')}
          ${thS('Consumes','consumes')}
          <th style="padding:6px 12px;text-align:center;font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.2em;color:var(--text-dim);" title="Raids attended. Color indicates consumable usage.">Raids</th>
          ${thS('#','attendance')}
          ${thS('Attendance %','pct','left')}
        </tr>
      </thead>
      <tbody>
        ${needIt.map(p => lootPlayerRow(p, false, null)).join('')}
        ${inactiveNeedIt.map(p => lootPlayerRow(p, true, 'Inactive')).join('')}
        ${haveIt.map(p => lootPlayerRow(p, true, 'Received')).join('')}
      </tbody>
    </table>
    <p style="margin-top:12px;font-size:13px;color:var(--text-dim);font-style:italic;">${needIt.length} eligible · ${haveIt.length} already received · ${inactiveNeedIt.length} inactive</p>
  `;
  setTimeout(() => { if (typeof $WowheadPower !== 'undefined' && $WowheadPower.refreshLinks) $WowheadPower.refreshLinks(); }, 200);
}

</script>
